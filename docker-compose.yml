services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080
      - DATABASE_URL=postgres://user:password@postgres:5432/urlshortener?sslmode=disable
      - REDIS_URL=redis:6379
    networks:
      - backend
    depends_on:
      postgres:
        # Wait for the health check to PASS before starting the app.
        # Without this, the app crashes because Postgres isn't ready yet.
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run migration automatically when the container starts
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
